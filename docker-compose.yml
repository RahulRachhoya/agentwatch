version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: agentwatch-db
    environment:
      POSTGRES_DB: agentwatch
      POSTGRES_USER: agentwatch
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentwatch"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agentwatch-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://agentwatch:password123@db:5432/agentwatch
      AGENTWATCH_API_KEY: "" # Set this to enable API authorization
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agentwatch-frontend
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres_data:
