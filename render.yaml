# Render Blueprint for AgentWatch
services:
  - type: web
    name: agentwatch-backend
    runtime: docker
    dockerfilePath: Dockerfile
    region: oregon
    plan: free
    branch: main
    healthCheckPath: /health

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agentwatch-db
          property: connectionString

      - key: AGENTWATCH_API_KEY
        sync: false

      - key: ALLOWED_ORIGINS
        value: "*"

      - key: PORT
        value: "8000"

    autoDeploy: true

databases:
  - name: agentwatch-db
    databaseName: agentwatch
    user: agentwatch
    plan: free
    region: oregon
