# render.yaml — Render Blueprint for AgentWatch backend
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: agentwatch-backend
    runtime: docker
    dockerfilePath: Dockerfile
    dockerContext: ./backend
    region: oregon       # free tier available in oregon & frankfurt
    plan: free
    branch: main

    # Health check — Render will only mark deploy live when this passes
    healthCheckPath: /health

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agentwatch-db
          property: connectionString

      - key: AGENTWATCH_API_KEY
        sync: false       # Set manually in Render dashboard (leave blank to disable auth)

      - key: PORT
        value: "8000"

    # Auto-deploy on every push to main
    autoDeploy: true

databases:
  - name: agentwatch-db
    databaseName: agentwatch
    user: agentwatch
    plan: free            # 1 GB storage, 1 GB RAM — plenty for MVP
    region: oregon
