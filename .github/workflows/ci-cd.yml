name: AgentWatch CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  RENDER_BACKEND_URL: "https://agentwatch-backend-b0ka.onrender.com"

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Lint & Test Backend
  # ─────────────────────────────────────────────
  backend-ci:
    name: 🐍 Backend — Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: agentwatch_test
          POSTGRES_USER: agentwatch
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://agentwatch:testpassword@localhost:5432/agentwatch_test
      AGENTWATCH_API_KEY: ""

    defaults:
      run:
        working-directory: backend

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx websockets

      - name: 🔍 Lint with ruff
        run: |
          pip install ruff --quiet
          ruff check . --ignore E501 || true

      - name: ✅ Check backend imports
        run: |
          python -c "
          import asyncio, sys
          sys.path.insert(0, '.')
          from main import app
          from db import init_db
          from auth import verify_api_key
          print('✅ Backend imports OK')
          "

      - name: 🧪 Run Integration Tests
        working-directory: .
        run: python tests/test_suite.py

  # ─────────────────────────────────────────────
  # JOB 2: Build & Test Frontend
  # ─────────────────────────────────────────────
  frontend-ci:
    name: ⚡ Frontend — Build & Lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 📦 Install pnpm
        run: npm install -g pnpm

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔍 Lint
        run: pnpm run lint || true

      - name: 🏗️ Build production bundle
        run: pnpm run build

      - name: 📤 Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 3: Docker Build Validation
  # ─────────────────────────────────────────────
  docker-build:
    name: 🐳 Docker Build Validation
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔨 Build backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: Dockerfile
          push: false
          tags: agentwatch-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # JOB 4: Verify Render Backend Deployment
  # Render auto-deploys on push to main (autoDeploy: true in render.yaml)
  # ─────────────────────────────────────────────
  verify-backend:
    name: 🚀 Verify Backend → Render
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: ⏳ Wait for Render auto-deploy to spin up
        run: sleep 60

      - name: 🏥 Health-check deployed backend
        run: |
          MAX_RETRIES=10
          RETRY_DELAY=15
          BACKEND_URL="${{ env.RENDER_BACKEND_URL }}"

          for i in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $i/$MAX_RETRIES — checking $BACKEND_URL/health"
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$BACKEND_URL/health" || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Backend is healthy!"
              curl -s "$BACKEND_URL/health"
              exit 0
            fi
            echo "⏳ Got $HTTP_CODE — retrying in ${RETRY_DELAY}s..."
            sleep $RETRY_DELAY
          done
          echo "❌ Backend health check failed after $MAX_RETRIES attempts"
          exit 1

  # ─────────────────────────────────────────────
  # JOB 5: Deploy Frontend to Vercel
  # (only on push to main)
  # ─────────────────────────────────────────────
  deploy-frontend:
    name: 🌐 Deploy Frontend → Vercel
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 📦 Install pnpm
        run: npm install -g pnpm

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 📦 Install Vercel CLI
        run: pnpm install -g vercel@latest

      - name: 🔗 Link Vercel project
        run: vercel link --yes --project agentwatch --token=${{ secrets.VERCEL_TOKEN }}

      - name: 🚀 Deploy to Vercel (Production)
        run: |
          vercel deploy --prod --yes \
            --token=${{ secrets.VERCEL_TOKEN }}
